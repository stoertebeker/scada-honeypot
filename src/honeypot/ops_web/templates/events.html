{% extends "base.html" %}
{% block title %}Ops Events{% endblock %}
{% block heading %}Events{% endblock %}
{% block content %}
<section>
  <h2>Filters</h2>
  <form class="filters" method="get" action="/events">
    <input name="event_type" value="{{ event_type }}" placeholder="event_type">
    <input name="source_ip" value="{{ source_ip }}" placeholder="source_ip">
    <input name="result" value="{{ result }}" placeholder="result">
    <input name="limit" type="number" min="1" max="500" value="{{ limit }}" placeholder="limit">
    <button type="submit">Apply</button>
  </form>
  {% include "partials/events_table.html" %}
</section>
{% endblock %}
