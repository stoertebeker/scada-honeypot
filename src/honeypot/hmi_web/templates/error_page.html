<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.page_title }}</title>
  <style>
    :root {
      --bg: #eef1ea;
      --panel: #fbfcf8;
      --line: #b8c1ba;
      --ink: #142226;
      --muted: #617174;
      --accent: #345867;
      --alarm: #9b2e26;
      --shadow: rgba(20, 34, 38, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Aptos", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(52, 88, 103, 0.14), transparent 28rem),
        linear-gradient(180deg, #f3f6f0 0%, var(--bg) 100%);
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    .masthead,
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 18px 40px var(--shadow);
    }

    .masthead {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      align-items: end;
      margin-bottom: 20px;
      padding: 22px 24px;
      background: linear-gradient(135deg, rgba(251, 252, 248, 0.98), rgba(217, 229, 234, 0.92));
    }

    .eyebrow,
    .meta {
      margin: 0;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 6px 0 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.05;
    }

    .subtitle {
      margin: 10px 0 0;
      max-width: 42rem;
      color: var(--muted);
    }

    nav a {
      display: inline-block;
      padding: 10px 14px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #f4f7f8;
      text-decoration: none;
      font-weight: 600;
    }

    nav a.current {
      background: transparent;
      color: var(--accent);
    }

    .panel {
      padding: 24px;
      border-left: 4px solid var(--alarm);
    }

    .status {
      margin: 0 0 12px;
      font-family: "IBM Plex Mono", "Cascadia Mono", monospace;
      color: var(--alarm);
      font-size: 1.3rem;
      font-weight: 700;
    }

    .message {
      margin: 0;
      max-width: 42rem;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .shell {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <div>
        <p class="eyebrow">{{ t("label.site") }} / {{ page.site_code }}</p>
        <h1>{{ page.page_title }}</h1>
        <p class="subtitle">{{ page.page_subtitle }}</p>
      </div>
      <div>
        <p class="meta">{{ page.site_name }}</p>
        <nav aria-label="Primary">
          {% for item in nav_items %}
          <a href="{{ item.href }}" class="{% if item.is_current %}current{% endif %}">{{ t(item.label_key) }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    <section class="panel">
      <p class="status">{{ page.error_label }} / {{ page.status_code }}</p>
      <p class="message">{{ page.error_message }}</p>
    </section>
  </div>
</body>
</html>
