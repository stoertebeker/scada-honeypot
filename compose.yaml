name: scada-honeypot

x-honeypot-common: &honeypot-common
  build:
    context: .
    dockerfile: Dockerfile
  image: scada-honeypot:base
  init: true
  restart: unless-stopped
  stop_grace_period: 20s
  read_only: true
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=64m,mode=1777
    - /app/tmp:size=64m,mode=1777
  env_file:
    - path: .env
      required: false
  environment:
    HONEYPOT_FORCE_CONTAINER_BINDS: "1"
    MODBUS_PORT: ${MODBUS_PORT:-1502}
    HMI_PORT: ${HMI_PORT:-8080}
    OPS_PORT: ${OPS_PORT:-9090}
    MODBUS_PUBLISHED_PORT: ${MODBUS_PUBLISHED_PORT:-1502}
    HMI_PUBLISHED_PORT: ${HMI_PUBLISHED_PORT:-8080}
    EVENT_STORE_PATH: /app/data/events.sqlite3
    JSONL_ARCHIVE_PATH: /app/logs/events.jsonl
    FINDINGS_LOG_PATH: /app/logs/findings.md
    RUNTIME_STATUS_PATH: /app/logs/runtime-status.json
    PCAP_CAPTURE_PATH: /app/pcap/session.pcapng
  volumes:
    - eventstore:/app/data
    - runtime-logs:/app/logs
    - runtime-pcap:/app/pcap
  healthcheck:
    test: ["CMD", "/healthcheck.sh"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  honeypot:
    <<: *honeypot-common
    ports:
      - "${HMI_PUBLISHED_HOST:-0.0.0.0}:${HMI_PUBLISHED_PORT:-8080}:${HMI_PORT:-8080}"
      - "${MODBUS_PUBLISHED_HOST:-0.0.0.0}:${MODBUS_PUBLISHED_PORT:-1502}:${MODBUS_PORT:-1502}"
      - "${OPS_PUBLISHED_HOST:-127.0.0.1}:${OPS_PUBLISHED_PORT:-9090}:${OPS_PORT:-9090}"

volumes:
  eventstore:
  runtime-logs:
  runtime-pcap:
